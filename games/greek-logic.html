<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple of Athena — Ami Lurie</title>
  <meta name="description" content="Temple of Athena: a Greek mythology logic puzzle. Arrange four sacred symbols in the correct hidden order.">
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <div id="site-nav"></div>

  <main>
    <div class="section">
      <div class="container">
        <header class="page-header">
          <h1>Temple of Athena</h1>
          <p>The goddess has hidden a sacred code within her temple. Arrange four Greek symbols in the correct secret order using logic and deduction.</p>
        </header>

        <div class="game-area" id="game-area">
          <p class="feedback-text" id="feedback" aria-live="polite">Select symbols to fill the 4 temple slots, then check your offering.</p>

          <div class="temple-board" id="board" aria-label="Your guess slots">
            <div class="temple-slot" data-slot="0"></div>
            <div class="temple-slot" data-slot="1"></div>
            <div class="temple-slot" data-slot="2"></div>
            <div class="temple-slot" data-slot="3"></div>
          </div>

          <div class="temple-palette" id="palette" aria-label="Sacred symbols">
            <button class="temple-symbol" data-symbol="owl" type="button" aria-label="Owl of Athena">&#129417;</button>
            <button class="temple-symbol" data-symbol="lightning" type="button" aria-label="Lightning Bolt of Zeus">&#9889;</button>
            <button class="temple-symbol" data-symbol="trident" type="button" aria-label="Trident of Poseidon">&#128305;</button>
            <button class="temple-symbol" data-symbol="laurel" type="button" aria-label="Laurel Wreath of Apollo">&#127811;</button>
          </div>

          <div class="text-center" id="controls">
            <div class="btn-group" style="justify-content:center;">
              <button class="btn btn-primary" id="check-btn" type="button" disabled>Check Offering</button>
              <button class="btn btn-secondary" id="clear-btn" type="button">Clear</button>
              <button class="btn btn-secondary" id="new-game-btn" type="button">New Code</button>
            </div>
          </div>

          <div class="mt-lg text-center" id="attempts-display">
            <p style="color:var(--color-text-muted); font-size:0.9rem;">Attempts: <strong id="attempt-count">0</strong></p>
          </div>

          <div id="win-message" class="hidden mt-lg text-center">
            <h2 style="color:var(--color-success); font-size:1.5rem;">The Temple Opens!</h2>
            <p style="color:var(--color-text-muted);" id="win-text"></p>
          </div>

          <div class="guess-history" id="history-section">
            <h3>Previous Offerings</h3>
            <div id="history-list"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../assets/components.js"></script>
  <script src="../assets/script.js" defer></script>
  <script src="../assets/games.js" defer></script>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      "use strict";

      var SYMBOLS = ["owl", "lightning", "trident", "laurel"];
      var DISPLAY = { owl: "\uD83E\uDD89", lightning: "\u26A1", trident: "\uD83D\uDD31", laurel: "\uD83C\uDF3F" };
      var NAMES = { owl: "Owl", lightning: "Bolt", trident: "Trident", laurel: "Laurel" };
      var SECRET = [];
      var guess = [null, null, null, null];
      var currentSlot = 0;
      var attempts = 0;
      var solved = false;

      var slots = document.querySelectorAll(".temple-slot");
      var symbols = document.querySelectorAll(".temple-symbol");
      var checkBtn = document.getElementById("check-btn");
      var clearBtn = document.getElementById("clear-btn");
      var newGameBtn = document.getElementById("new-game-btn");
      var feedback = document.getElementById("feedback");
      var attemptCount = document.getElementById("attempt-count");
      var winMessage = document.getElementById("win-message");
      var winText = document.getElementById("win-text");
      var historyList = document.getElementById("history-list");

      function newGame() {
        SECRET = GameUtils.shuffleArray(SYMBOLS);
        guess = [null, null, null, null];
        currentSlot = 0;
        attempts = 0;
        solved = false;

        attemptCount.textContent = "0";
        feedback.textContent = "Select symbols to fill the 4 temple slots, then check your offering.";
        winMessage.classList.add("hidden");
        checkBtn.disabled = true;
        historyList.innerHTML = "";

        slots.forEach(function (slot) {
          slot.textContent = "";
          slot.className = "temple-slot";
        });
      }

      function placeSymbol(sym) {
        if (solved || currentSlot >= 4) return;

        guess[currentSlot] = sym;
        slots[currentSlot].textContent = DISPLAY[sym];
        slots[currentSlot].classList.add("filled");
        currentSlot++;

        if (currentSlot === 4) {
          checkBtn.disabled = false;
        }
      }

      function clearGuess() {
        if (solved) return;
        guess = [null, null, null, null];
        currentSlot = 0;
        checkBtn.disabled = true;

        slots.forEach(function (slot) {
          slot.textContent = "";
          slot.className = "temple-slot";
        });
      }

      function checkGuess() {
        if (solved || currentSlot < 4) return;

        attempts++;
        attemptCount.textContent = attempts;

        var correctPosition = 0;
        var correctSymbol = 0;
        var secretCopy = SECRET.slice();
        var guessCopy = guess.slice();

        for (var i = 0; i < 4; i++) {
          if (guessCopy[i] === secretCopy[i]) {
            correctPosition++;
            slots[i].classList.add("correct");
            secretCopy[i] = null;
            guessCopy[i] = null;
          }
        }

        for (var j = 0; j < 4; j++) {
          if (guessCopy[j] === null) continue;
          var idx = secretCopy.indexOf(guessCopy[j]);
          if (idx !== -1) {
            correctSymbol++;
            slots[j].classList.add("wrong-position");
            secretCopy[idx] = null;
          } else {
            slots[j].classList.add("incorrect");
          }
        }

        var row = document.createElement("div");
        row.className = "guess-row";
        var symbolsHtml = "";
        for (var k = 0; k < 4; k++) {
          symbolsHtml += DISPLAY[guess[k]] + " ";
        }
        var hintParts = [];
        if (correctPosition > 0) hintParts.push(correctPosition + " correct");
        if (correctSymbol > 0) hintParts.push(correctSymbol + " misplaced");
        if (correctPosition === 0 && correctSymbol === 0) hintParts.push("none match");
        row.innerHTML = '<span>' + symbolsHtml.trim() + '</span><span class="hint">' + hintParts.join(", ") + '</span>';
        historyList.insertBefore(row, historyList.firstChild);

        if (correctPosition === 4) {
          solved = true;
          feedback.textContent = "";
          winMessage.classList.remove("hidden");
          winText.textContent = "Athena's code cracked in " + attempts + (attempts === 1 ? " offering!" : " offerings!") + " The temple doors swing open.";
          checkBtn.disabled = true;
        } else {
          var hints = [];
          if (correctPosition > 0) hints.push(correctPosition + " in the right place");
          if (correctSymbol > 0) hints.push(correctSymbol + " right symbol, wrong place");
          if (correctPosition === 0 && correctSymbol === 0) hints.push("No symbols match the code");
          feedback.textContent = hints.join(". ") + ". Try again.";

          setTimeout(function () {
            if (!solved) clearGuess();
          }, 1400);
        }
      }

      symbols.forEach(function (sym) {
        sym.addEventListener("click", function () {
          placeSymbol(sym.getAttribute("data-symbol"));
        });
      });

      checkBtn.addEventListener("click", checkGuess);
      clearBtn.addEventListener("click", clearGuess);
      newGameBtn.addEventListener("click", newGame);

      newGame();
    });
  </script>
</body>
</html>
